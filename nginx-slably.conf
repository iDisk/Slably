server {
    server_name slably.app www.slably.app;

    root /var/www/slably/artifacts/buildos/dist/public;
    index index.html;

    client_max_body_size 15M;

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 120s;
    }

    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/slably.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/slably.app/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = www.slably.app) {
        return 301 https://$host$request_uri;
    }

    if ($host = slably.app) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name slably.app www.slably.app;
    return 404;
}
